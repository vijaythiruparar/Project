<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Selector Demo</title>
    <style>
        /* Common styles for all boxes */
        .box {
            width: 200px;
            height: 100px;
            margin: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 8px;
        }

        /* Specific class selectors for background colors */
        .bg-red {
            background-color: #e74c3c;
        }

        .bg-green {
            background-color: #2ecc71;
        }

        .bg-purple {
            background-color: #9b59b6;
        }
    </style>
</head>
<body>

    <div class="box bg-red">Red Box</div>
    <div class="box bg-green">Green Box</div>
    <div class="box bg-purple">Purple Box</div>

</body>
</html>
